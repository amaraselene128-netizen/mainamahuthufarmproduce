[build]
  command = "npm run build"
  publish = "dist"

# Edge Functions configuration
[functions]
  [functions.edge_functions]
    # No external modules needed for now

# Edge Functions routes
[[edge_functions]]
  function = "prerender"
  path = "/products/*"
  
[[edge_functions]]
  function = "prerender"
  path = "/services/*"
  
[[edge_functions]]
  function = "prerender"
  path = "/events/*"
  
[[edge_functions]]
  function = "prerender"
  path = "/shop/*"

# Dynamic sitemap redirects (MUST come before static files)
[[redirects]]
  from = "/sitemap-dynamic-index.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=index"
  status = 200
  force = true
  headers = {Content-Type = "application/xml"}

[[redirects]]
  from = "/sitemap-dynamic-shops.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=shops"
  status = 200
  force = true
  headers = {Content-Type = "application/xml"}

[[redirects]]
  from = "/sitemap-dynamic-products.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=products"
  status = 200
  force = true
  headers = {Content-Type = "application/xml"}

[[redirects]]
  from = "/sitemap-dynamic-services.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=services"
  status = 200
  force = true
  headers = {Content-Type = "application/xml"}

[[redirects]]
  from = "/sitemap-dynamic-events.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=events"
  status = 200
  force = true
  headers = {Content-Type = "application/xml"}

# Static sitemap files (only if they exist in dist/)
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = false

[[redirects]]
  from = "/sitemap-index.xml"
  to = "/sitemap-index.xml"
  status = 200
  force = false

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = false

# SPA catch-all (must be LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for XML files
[[headers]]
  for = "/sitemap-dynamic-*.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"