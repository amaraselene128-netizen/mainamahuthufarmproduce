[build]
  command = "npm run build"
  publish = "dist"

# Enable Edge Functions
[functions]
  edge_functions = true

# Edge Functions configuration
[[edge_functions]]
  function = "prerender"
  path = "/products/*"
  
[[edge_functions]]
  function = "prerender"
  path = "/services/*"
  
[[edge_functions]]
  function = "prerender"
  path = "/events/*"
  
[[edge_functions]]
  function = "prerender"
  path = "/shop/*"

# Sitemap redirects
[[redirects]]
  from = "/sitemap-dynamic-index.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=index"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-dynamic-shops.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=shops"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-dynamic-products.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=products"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-dynamic-services.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=services"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-dynamic-events.xml"
  to = "https://nanxwdsvtgswkwjodlpm.supabase.co/functions/v1/dynamic-sitemap?type=events"
  status = 200
  force = true

# Static sitemap files
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/sitemap-index.xml"
  to = "/sitemap-index.xml"
  status = 200

[[redirects]]
  from = "/sitemap-pages.xml"
  to = "/sitemap-pages.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# SPA catch-all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers
[[headers]]
  for = "/sitemap-*.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"