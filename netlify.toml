[build]
  command = "npm run build"
  publish = "dist"

# ============================================================
# BOT PRERENDERING (must come BEFORE the SPA catch-all)
# Crawlers get fully-rendered SEO HTML from the prerender edge function.
# Real users fall through to the SPA.
# ============================================================
[[redirects]]
  from = "/products/*"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/prerender?path=/products/:splat"
  status = 200
  force = true
  conditions = { User-Agent = ["Googlebot", "Bingbot", "Slurp", "DuckDuckBot", "Baiduspider", "YandexBot", "Sogou", "Exabot", "facebot", "facebookexternalhit", "Twitterbot", "LinkedInBot", "WhatsApp", "TelegramBot", "Applebot", "Discordbot", "Pinterestbot", "redditbot", "ia_archiver"] }

[[redirects]]
  from = "/services/*"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/prerender?path=/services/:splat"
  status = 200
  force = true
  conditions = { User-Agent = ["Googlebot", "Bingbot", "Slurp", "DuckDuckBot", "Baiduspider", "YandexBot", "Sogou", "Exabot", "facebot", "facebookexternalhit", "Twitterbot", "LinkedInBot", "WhatsApp", "TelegramBot", "Applebot", "Discordbot", "Pinterestbot", "redditbot", "ia_archiver"] }

[[redirects]]
  from = "/events/*"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/prerender?path=/events/:splat"
  status = 200
  force = true
  conditions = { User-Agent = ["Googlebot", "Bingbot", "Slurp", "DuckDuckBot", "Baiduspider", "YandexBot", "Sogou", "Exabot", "facebot", "facebookexternalhit", "Twitterbot", "LinkedInBot", "WhatsApp", "TelegramBot", "Applebot", "Discordbot", "Pinterestbot", "redditbot", "ia_archiver"] }

[[redirects]]
  from = "/shop/*"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/prerender?path=/shop/:splat"
  status = 200
  force = true
  conditions = { User-Agent = ["Googlebot", "Bingbot", "Slurp", "DuckDuckBot", "Baiduspider", "YandexBot", "Sogou", "Exabot", "facebot", "facebookexternalhit", "Twitterbot", "LinkedInBot", "WhatsApp", "TelegramBot", "Applebot", "Discordbot", "Pinterestbot", "redditbot", "ia_archiver"] }

# Proxy dynamic sitemaps through your domain (must come BEFORE static sitemap rules)
[[redirects]]
  from = "/dynamic-sitemap"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/dynamic-sitemap"
  status = 200
  force = true
  query = { type = ":type" }

[[redirects]]
  from = "/sitemap-dynamic-index.xml"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/dynamic-sitemap?type=index"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-dynamic-shops.xml"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/dynamic-sitemap?type=shops"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-dynamic-products.xml"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/dynamic-sitemap?type=products"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-dynamic-services.xml"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/dynamic-sitemap?type=services"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-dynamic-events.xml"
  to = "https://wxokpcbouchusnplpruc.supabase.co/functions/v1/dynamic-sitemap?type=events"
  status = 200
  force = true

# Serve sitemap files directly (must come BEFORE catch-all redirect)
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/sitemap-index.xml"
  to = "/sitemap-index.xml"
  status = 200

[[redirects]]
  from = "/sitemap-pages.xml"
  to = "/sitemap-pages.xml"
  status = 200

[[redirects]]
  from = "/sitemap-products.xml"
  to = "/sitemap-products.xml"
  status = 200

[[redirects]]
  from = "/sitemap-services.xml"
  to = "/sitemap-services.xml"
  status = 200

[[redirects]]
  from = "/sitemap-events.xml"
  to = "/sitemap-events.xml"
  status = 200

[[redirects]]
  from = "/sitemap-shops.xml"
  to = "/sitemap-shops.xml"
  status = 200

[[redirects]]
  from = "/sitemap.txt"
  to = "/sitemap.txt"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# SPA catch-all redirect (must be LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
# Sitemap headers
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-pages.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-products.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-services.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-events.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"
    Cache-Control = "public, max-age=3600"

# Dynamic sitemap proxy headers
[[headers]]
  for = "/sitemap-dynamic-*"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Robots-Tag = "noindex"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Robots-Tag = "noindex"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
